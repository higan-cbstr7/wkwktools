<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,
		initial-scale=1.0">
		
		<title>実厳選表作成ツール</title>
	</head>
		<body>		
			<form action="" method="POST" id="ichiran1">
				<label>キャラ名を入力
					<input type="text" name="name" required>  
				</label>
				<label>ワクワクの実	
					<select>
						<option value="">実を選択してください</option>
						<optgroup label="加撃">
						<option>同族・加撃</option> 
						<option>同族・加命撃</option>
						<option>同族・加撃速</option>
						<option>撃種・加撃</option>
						<option>撃種・加命撃</option>
						<option>撃種・加撃速</option>
						<option>戦型・加撃</option>
						<option>戦型・加命撃</option>
						<option>戦型・加撃速</option>
						<option>孤高・加撃</option>
						<optgroup label="サポート">
						<option>熱き友撃</option>
						<option>将命</option>
						<option>兵命</option>
						<option>速必殺</option>
						<option>怪我減り</option>
						<option>毒我慢</option>
						<option>一撃失神</option>
						<option>ちび癒し</option>
						<option>ハート強化</option>
						<optgroup label="加命加速">
						<option>同族・加命</option>
						<option>同族・加速命</option>
						<option>同族・加速</option>
						<option>撃種・加命</option>
						<option>撃種・加速命</option>
						<option>撃種・加速</option>
						<option>戦型・加命</option>
						<option>戦型・加速命</option>
						<option>戦型・加速</option>
						<optgroup label="稼ぎ系">
						<option>荒稼ぎ</option>
						<option>スコア稼ぎ</option>
						<option>Sランク</option>
						<option>学び</option>
					</select>
				</label>	
				<label>
					<input type="checkbox" name="level" value="EL">特級EL
				</label>
				<input type="submit" value="作成" id="make">
			</form>
		</body>
</html>
