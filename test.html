<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,
		initial-scale=1.0">
		
		<title>実厳選表作成ツール</title>
	</head>
		<body>		
			<form action="" method="POST" id="ichiran1">
				<label>キャラ名を入力
					<input type="text" name="name" id="chara1">  
				</label>
				<label>ワクワクの実	
					<select id="jitu1">
						<option value="">実を選択してください</option>
						<optgroup label="加撃">
						<option>同族・加撃</option> 
						<option>同族・加命撃</option>
						<option>同族・加撃速</option>
						<option>撃種・加撃</option>
						<option>撃種・加命撃</option>
						<option>撃種・加撃速</option>
						<option>戦型・加撃</option>
						<option>戦型・加命撃</option>
						<option>戦型・加撃速</option>
						<option>孤高・加撃</option>
						<optgroup label="サポート">
						<option>熱き友撃</option>
						<option>将命</option>
						<option>兵命</option>
						<option>速必殺</option>
						<option>怪我減り</option>
						<option>毒我慢</option>
						<option>一撃失神</option>
						<option>ちび癒し</option>
						<option>ハート強化</option>
						<optgroup label="加命加速">
						<option>同族・加命</option>
						<option>同族・加速命</option>
						<option>同族・加速</option>
						<option>撃種・加命</option>
						<option>撃種・加速命</option>
						<option>撃種・加速</option>
						<option>戦型・加命</option>
						<option>戦型・加速命</option>
						<option>戦型・加速</option>
						<optgroup label="稼ぎ系">
						<option>荒稼ぎ</option>
						<option>スコア稼ぎ</option>
						<option>Sランク</option>
						<option>学び</option>
					</select>
				</label>	
				<label>
					<input type="checkbox" name="level" value="EL" id="el">特級EL
				</label>
				<input type="submit" value="作成" id="make">
			</form>
			
			<table id="result1">
				<tbody id="result0">
					<tr>
						<td></td>
					</tr>
					<tr>
						<td></td>
						<td></td>
					</tr>
				</tbody>	
			</table>
			<script>

				const nform=document.getElementById("ichiran1");

				function kindofmi(){
					event.preventDefault(event);
					const mtable=document.getElementById("result1");
					const mbody=document.getElementById("result0");
					const cname=document.getElementById("chara1");
					const wkwks1=document.getElementById("jitu1").value;
					const plus1=document.getElementById("el");
					
					const ntr=document.createElement("tr");
					const ntd=document.createElement("td");

					const mtr=document.createElement("tr");
					const mtd=document.createElement("td");
					const ptd=document.createElement("td");

					ntd.textContent=cname.value;

					mtd.textContent=wkwks1;
					if(plus1.checked){
						ptd.textContent="特EL";
					}
					else{;}
					
					ntr.appendChild(ntd);
					mtr.appendChild(mtd);
					mtr.appendChild(ptd);
					mbody.appendChild(ntr);
					mbody.appendChild(mtr);
					
					nform.reset();
				}
				nform.addEventListener("submit", kindofmi, false);
			</script>




		</body>
</html>
