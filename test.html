<!--確認用-->
<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,
		initial-scale=1.0">
		
		<title>実厳選表作成ツール</title>
	</head>
		<body>		
			<form action="" method="POST" id="ichiran1">
				<label>キャラ名を入力
					<input type="text" name="name" id="chara1">  
				</label>
				<label>ワクワクの実	
					<select id="jitu1">
						<option value="">実を選択してください</option>
						<optgroup label="加撃">
						<option>同族・加撃</option> 
						<option>同族・加命撃</option>
						<option>同族・加撃速</option>
						<option>撃種・加撃</option>
						<option>撃種・加命撃</option>
						<option>撃種・加撃速</option>
						<option>戦型・加撃</option>
						<option>戦型・加命撃</option>
						<option>戦型・加撃速</option>
						<option>孤高・加撃</option>
						<optgroup label="サポート">
						<option>熱き友撃</option>
						<option>将命</option>
						<option>兵命</option>
						<option>速必殺</option>
						<option>怪我減り</option>
						<option>毒我慢</option>
						<option>一撃失神</option>
						<option>ちび癒し</option>
						<option>ハート強化</option>
						<optgroup label="加命加速">
						<option>同族・加命</option>
						<option>同族・加速命</option>
						<option>同族・加速</option>
						<option>撃種・加命</option>
						<option>撃種・加速命</option>
						<option>撃種・加速</option>
						<option>戦型・加命</option>
						<option>戦型・加速命</option>
						<option>戦型・加速</option>
						<optgroup label="稼ぎ系">
						<option>荒稼ぎ</option>
						<option>スコア稼ぎ</option>
						<option>Sランク</option>
						<option>学び</option>
					</select>
				</label>	
				<label>
					<input type="checkbox" name="level" value="EL" id="el">特級EL
				</label>
				<input type="submit" value="作成" id="make">
			</form>
			<!--フォーム内容出力先 !-->
			<table id="result1">
				<tbody id="result0">
					<tr>
						<td></td>
					</tr>
					<tr>
						<td></td>
						<td></td>
					</tr>
				</tbody>	
			</table>
			<script>

				const nform=document.getElementById("ichiran1");

				function kindofmi(){
					//フォーム送信時にページ遷移しないようにする//
					event.preventDefault(event);
					//フォーム内容出力先の表（table要素及びtbody要素）の内容を取得。//
					// コンボボックスについては入力値（選択したもの）を取得したいのでgetElementById().value;とする//
					//getelementByIdだけだとHTML要素を取得してしまい、コンボボックスの場合[object HTMLInputElement]という要素そのものが取得されてしまう//
					//チェックボックスに関しては今回出力としては文字列（特EL）を指定しているのでvalueを付けなくても問題ない//
					//コンボボックスについて、ここでvalue指定してもいいし、textContentを使って追加td要素に代入する時に代入物の後にvalueをつけてもよい//
					const mtable=document.getElementById("result1");
					const mbody=document.getElementById("result0");
					const cname=document.getElementById("chara1");
					const wkwks1=document.getElementById("jitu1").value;
					const plus1=document.getElementById("el");
					
					//table要素の中の1行分を示すtr要素を作ってntrという名前を付ける//
					const ntr=document.createElement("tr");
					//table要素の中の1行分にあるデータを示すtd要素を作ってntdという名前を付ける。//
					//作ったhtml要素は「追加先のhtml要素（trなど親要素となる要素が多い）.appendChild(追加したい要素);」で追加する。追加時は親要素の一番最後の位置に追加される//
					const ntd=document.createElement("td");
					//以下も同じ//
					const mtr=document.createElement("tr");
					const mtd=document.createElement("td");
					const ptd=document.createElement("td");

					/*先程作った空のtd要素であるntdに、
					cnameの値（今回はchara1というidが付いたテキストボックスの入力値）
					を代入している。
					.textContentは、オブジェクトや変数の内容を取得する機能及びオブジェクトや変数の内容を上書きする機能がある。
					「オブジェクト.textContent」で、オブジェクトの内容を取得する。
					「オブジェクト.textContent=文字列;」	でオブジェクトの内容を、=で代入した文字列へと上書きする*/
					//.valueもピリオド前のオブジェクトや変数の値を取得するが、取得対象は一般にinputなどの入力フォームに入力された値である。入力フォームに入力された値はtextContentでは取得できない。//
					//今回はcname.valueにしないとcnameが持っているinputタグそのもの（[object HTMLInputElement]）が出力されることになる//
					ntd.textContent=cname.value;
					
					mtd.textContent=wkwks1;
					if(plus1.checked){
						ptd.textContent="特EL";
					}
					else{;}
					
					ntr.appendChild(ntd);
					mtr.appendChild(mtd);
					mtr.appendChild(ptd);
					mbody.appendChild(ntr);
					mbody.appendChild(mtr);
					
					//フォーム送信後に入力値をリセットする//
					nform.reset();
				}
				nform.addEventListener("submit", kindofmi, false);
			</script>




		</body>
</html>
